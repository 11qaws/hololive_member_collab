<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Hololive Collab Tracker</title>
<link rel="stylesheet" href="https://cdn.simplecss.org/simple.min.css">
<style>

.app-row { display: flex; gap: 1em; align-items: center; padding: 0.5em; border-bottom: 1px solid #eee; }
.app-row:hover { background: #f5f5f5; }
.app-date { min-width: 100px; color: #666; }
.app-channel { min-width: 150px; }
.app-title { flex: 1; }
.app-status { min-width: 30px; text-align: center; }
.branch-group { margin-bottom: 2em; }
.member-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 1em; }
.member-card { padding: 1em; border: 1px solid #ddd; border-radius: 8px; }
.member-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
.filter-bar { margin: 1em 0; padding: 1em; background: #f8f9fa; border-radius: 8px; }

<script>function filterApps(){const f=document.getElementById("filter").value.toLowerCase();const s=document.getElementById("statusFilter").value;document.querySelectorAll(".app-row").forEach(r=>{const matchChannel=r.dataset.channel.includes(f);const matchStatus=s==="all"||r.dataset.status===s;r.style.display=matchChannel&&matchStatus?"":"none"})}</script>
