<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>@gawrgura — HCAT</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f8f9fc;
  --surface: #ffffff;
  --surface-2: #f0f2f6;
  --text: #1a1d23;
  --text-2: #6b7280;
  --border: #e5e7eb;
  --accent: #8b5cf6;
  --accent-2: #ec4899;
  --gradient: linear-gradient(135deg, var(--accent), var(--accent-2));
  --shadow: 0 1px 3px rgba(0,0,0,.08);
  --shadow-lg: 0 10px 25px rgba(0,0,0,.1);
  --radius: 12px;
  --radius-sm: 8px;
}
.dark {
  --bg: #0f1117;
  --surface: #1a1d26;
  --surface-2: #252833;
  --text: #e8eaed;
  --text-2: #9ca3af;
  --border: #2d3140;
  --shadow: 0 1px 3px rgba(0,0,0,.3);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  transition: background .3s, color .3s;
}
header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 1rem 2rem;
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(12px);
  background: rgba(255,255,255,.85);
}
.dark header { background: rgba(15,17,23,.85); }
header .inner {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
header h1 { font-size: 1.15rem; font-weight: 600; }
header h1 a { text-decoration: none; color: var(--text); }
header h1 span { background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
header nav a {
  text-decoration: none;
  color: var(--text-2);
  font-size: .875rem;
  padding: .4rem .8rem;
  border-radius: var(--radius-sm);
  transition: all .2s;
}
header nav a:hover { color: var(--text); background: var(--surface-2); }
.theme-toggle {
  background: none; border: 1px solid var(--border); color: var(--text-2);
  cursor: pointer; padding: .4rem .6rem; border-radius: var(--radius-sm); font-size: 1rem;
}
.theme-toggle:hover { color: var(--text); border-color: var(--accent); }

main { max-width: 900px; margin: 2rem auto; padding: 0 2rem; }

.profile {
  display: flex;
  align-items: center;
  gap: 1.5rem;
  padding: 2rem;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 2rem;
}
.profile .avatar {
  width: 72px; height: 72px;
  border-radius: 50%;
  background: var(--gradient);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.75rem; font-weight: 700; color: #fff;
  flex-shrink: 0;
}
.profile .info h2 { font-size: 1.5rem; font-weight: 700; margin-bottom: .15rem; }
.profile .info .handle { font-size: .9rem; color: var(--text-2); }
.profile .info .meta { display: flex; gap: 1rem; margin-top: .5rem; flex-wrap: wrap; }
.profile .info .meta span { font-size: .8rem; color: var(--text-2); }
.stat-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: .75rem;
  margin-bottom: 2rem;
}
.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.25rem;
  text-align: center;
}
.stat-card .num { font-size: 1.75rem; font-weight: 700; }
.stat-card .label { font-size: .75rem; color: var(--text-2); margin-top: .15rem; }
.stat-card.total .num { background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.stat-card.confirmed .num { color: #34d399; }
.stat-card.unreviewed .num { color: #fbbf24; }

.filter-bar {
  display: flex;
  gap: .75rem;
  margin-bottom: 1rem;
  flex-wrap: wrap;
}
.filter-bar input, .filter-bar select {
  padding: .5rem .75rem;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--surface);
  color: var(--text);
  font-size: .85rem;
  font-family: inherit;
  outline: none;
}
.filter-bar input:focus, .filter-bar select:focus { border-color: var(--accent); }

table { width: 100%; border-collapse: separate; border-spacing: 0; }
thead th {
  position: sticky;
  top: 65px;
  background: var(--surface-2);
  padding: .75rem .75rem;
  font-size: .75rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .04em;
  color: var(--text-2);
  text-align: left;
}
tbody tr {
  transition: background .15s;
}
tbody tr:hover { background: var(--surface-2); }
tbody td {
  padding: .75rem;
  border-bottom: 1px solid var(--border);
  font-size: .85rem;
  vertical-align: middle;
}
td .title { max-width: 350px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
td .title a { color: var(--text); text-decoration: none; }
td .title a:hover { color: var(--accent); }
.status-badge {
  display: inline-block;
  padding: .15rem .5rem;
  border-radius: 999px;
  font-size: .7rem;
  font-weight: 500;
}
.status-unreviewed { background: rgba(251,191,36,.12); color: #fbbf24; }
.status-confirmed { background: rgba(52,211,153,.12); color: #34d399; }
.status-rejected { background: rgba(248,113,113,.12); color: #f87171; text-decoration: line-through; }
.btn {
  cursor: pointer;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text-2);
  padding: .3rem .6rem;
  border-radius: var(--radius-sm);
  font-size: .8rem;
  transition: all .15s;
}
.btn:hover { border-color: var(--accent); color: var(--text); }
.btn-confirm:hover { border-color: #34d399; color: #34d399; }
.btn-reject:hover { border-color: #f87171; color: #f87171; }
.empty-state {
  text-align: center;
  padding: 3rem;
  color: var(--text-2);
  font-size: .9rem;
}
@media (max-width: 640px) {
  main { padding: 0 1rem; }
  .stat-row { grid-template-columns: 1fr; }
  .profile { flex-direction: column; text-align: center; }
  td .title { max-width: 180px; }
}
</style>
</head>
<body>
<header>
<div class="inner">
<h1><a href="../index.html"><span>HCAT</span></a></h1>
<nav>
<a href="../index.html">Members</a>
<button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">🌙</button>
</nav>
</div>
</header>
<main>
<div class="profile">

<img class="avatar" src="https://yt3.ggpht.com/6BCfAqi9yIpZbHLbw9BAWySvB3XZf9r8jFqudO5nSOsHoGzLhlKrm1M1uuMCRabi_pXGDzl7=s800-c-k-c0x00ffffff-no-rj" alt="Gawr Gura がうる・ぐら">

<div class="info">
<h2>Gawr Gura がうる・ぐら</h2>
<div class="handle">@gawrgura</div>
<div class="meta">
<span>EN</span>

<span class="badge badge-graduated">graduated</span>


</div>
</div>
</div>

<div class="stat-row">
<div class="stat-card total">
<div class="num">0</div>
<div class="label">Total</div>
</div>
<div class="stat-card confirmed">
<div class="num">0</div>
<div class="label">Confirmed</div>
</div>
<div class="stat-card unreviewed">
<div class="num">0</div>
<div class="label">Unreviewed</div>
</div>
</div>


<div class="empty-state">No appearances recorded yet. Run a scan first.</div>

</main>
<script>
const saved = localStorage.getItem('hcat-theme');
if (saved === 'dark') document.body.classList.add('dark');
function toggleTheme() {
  document.body.classList.toggle('dark');
  localStorage.setItem('hcat-theme', document.body.classList.contains('dark') ? 'dark' : 'light');
}
function filterApps() {
  const f = document.getElementById('filter').value.toLowerCase().trim();
  const s = document.getElementById('statusFilter').value;
  document.querySelectorAll('tbody tr').forEach(r => {
    const mc = !f || r.dataset.channel.includes(f);
    const ms = s === 'all' || r.dataset.status === s;
    r.style.display = mc && ms ? '' : 'none';
  });
}
async function setStatus(vid, action) {
  const handle = 'gawrgura';
  /* static */ console.log(${handle}/${vid}/${action}`, { method: 'POST' });
  location.reload();
}
</script>
</body>
</html>
