<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>@hakuikoyori — HCAT</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f8f9fc;
  --surface: #ffffff;
  --surface-2: #f0f2f6;
  --text: #1a1d23;
  --text-2: #6b7280;
  --border: #e5e7eb;
  --accent: #8b5cf6;
  --accent-2: #ec4899;
  --accent-3: #06b6d4;
  --gradient: linear-gradient(135deg, var(--accent), var(--accent-2));
  --shadow: 0 1px 3px rgba(0,0,0,.08);
  --shadow-lg: 0 10px 25px rgba(0,0,0,.1);
  --radius: 12px;
  --radius-sm: 8px;
}
.dark {
  --bg: #0f1117;
  --surface: #1a1d26;
  --surface-2: #252833;
  --text: #e8eaed;
  --text-2: #9ca3af;
  --border: #2d3140;
  --shadow: 0 1px 3px rgba(0,0,0,.3);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  transition: background .3s, color .3s;
}
header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 1rem 2rem;
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(12px);
  background: rgba(255,255,255,.85);
}
.dark header { background: rgba(15,17,23,.85); }
header .inner {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
header h1 { font-size: 1.15rem; font-weight: 600; }
header h1 a { text-decoration: none; color: var(--text); }
header h1 span { background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
header nav a {
  text-decoration: none;
  color: var(--text-2);
  font-size: .875rem;
  padding: .4rem .8rem;
  border-radius: var(--radius-sm);
  transition: all .2s;
}
header nav a:hover { color: var(--text); background: var(--surface-2); }
.theme-toggle {
  background: none; border: 1px solid var(--border); color: var(--text-2);
  cursor: pointer; padding: .4rem .6rem; border-radius: var(--radius-sm); font-size: 1rem;
}
.theme-toggle:hover { color: var(--text); border-color: var(--accent); }

main { max-width: 900px; margin: 2rem auto; padding: 0 2rem; }

.profile {
  display: flex;
  align-items: center;
  gap: 1.5rem;
  padding: 2rem;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 2rem;
}
.profile .avatar {
  width: 72px; height: 72px;
  border-radius: 50%;
  background: var(--gradient);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.75rem; font-weight: 700; color: #fff;
  flex-shrink: 0;
}
.profile .info h2 { font-size: 1.5rem; font-weight: 700; margin-bottom: .15rem; }
.profile .info .name-jp { font-size: .85rem; color: var(--text-2); margin-bottom: .15rem; }
.profile .info .handle { font-size: .9rem; color: var(--text-2); }
.profile .info .meta { display: flex; gap: 1rem; margin-top: .5rem; flex-wrap: wrap; }
.profile .info .meta span { font-size: .8rem; color: var(--text-2); }
.stat-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: .75rem;
  margin-bottom: 2rem;
}
.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.25rem;
  text-align: center;
}
.stat-card .num { font-size: 1.75rem; font-weight: 700; }
.stat-card .label { font-size: .75rem; color: var(--text-2); margin-top: .15rem; }
.stat-card.streams .num { color: var(--accent-3); }
.stat-card.collabs .num { color: var(--accent-2); }
.stat-card.partners .num { background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

.top-partners {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1rem 1.25rem;
  margin-bottom: 1.5rem;
}
.top-partners-title {
  font-size: .85rem;
  font-weight: 600;
  margin-bottom: .75rem;
  color: var(--text-2);
}
.top-partners-list {
  display: flex;
  flex-direction: column;
  gap: .5rem;
}
.top-partner-item {
  display: flex;
  align-items: center;
  gap: .5rem;
  padding: .35rem .5rem;
  border-radius: var(--radius-sm);
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: background .15s;
}
.top-partner-item:hover { background: var(--surface-2); }
.top-partner-bar {
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  background: var(--gradient);
  opacity: .08;
  border-radius: var(--radius-sm);
  pointer-events: none;
}
.top-partner-name {
  font-size: .8rem;
  font-weight: 500;
  min-width: 80px;
  z-index: 1;
}
.top-partner-count {
  font-size: .8rem;
  color: var(--text-2);
  font-weight: 600;
  z-index: 1;
}

.filter-bar {
  display: flex;
  flex-direction: column;
  gap: .5rem;
  margin-bottom: .5rem;
}
.filter-row {
  display: flex;
  gap: .75rem;
  flex-wrap: wrap;
  align-items: flex-end;
}
.filter-group {
  display: flex;
  flex-direction: column;
  gap: .2rem;
}
.filter-group label {
  font-size: .7rem;
  font-weight: 500;
  color: var(--text-2);
  text-transform: uppercase;
  letter-spacing: .03em;
}
.filter-bar input, .filter-bar select {
  padding: .45rem .65rem;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--surface);
  color: var(--text);
  font-size: .82rem;
  font-family: inherit;
  outline: none;
  transition: border-color .15s;
  height: 34px;
}
.filter-bar input:focus, .filter-bar select:focus { border-color: var(--accent); }
.filter-reset {
  height: 34px;
  padding: 0 .9rem;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--surface);
  color: var(--text-2);
  font-size: .82rem;
  font-family: inherit;
  cursor: pointer;
  transition: all .15s;
}
.filter-reset:hover {
  border-color: var(--accent-2);
  color: var(--accent-2);
}
.partner-select {
  position: relative;
  width: 100%;
}
.partner-selected {
  display: flex;
  align-items: center;
  gap: .35rem;
  flex-wrap: wrap;
  min-height: 34px;
  padding: .25rem .5rem;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--surface);
  cursor: pointer;
  transition: border-color .15s;
}
.partner-selected:hover { border-color: var(--accent); }
.partner-selected-placeholder {
  font-size: .82rem;
  color: var(--text-2);
}
.selected-tag {
  display: inline-flex;
  align-items: center;
  gap: .25rem;
  padding: .15rem .5rem;
  background: var(--accent);
  color: #fff;
  border-radius: 999px;
  font-size: .75rem;
  font-weight: 500;
}
.selected-tag-remove {
  cursor: pointer;
  font-size: 1rem;
  line-height: 1;
  opacity: .7;
  transition: opacity .15s;
}
.selected-tag-remove:hover { opacity: 1; }
.partner-dropdown {
  display: none;
  position: absolute;
  top: 100%;
  left: 0;
  right: 0;
  z-index: 50;
  margin-top: 4px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--surface);
  box-shadow: var(--shadow-lg);
  max-height: 360px;
  overflow-y: auto;
}
.partner-dropdown.open { display: block; }
.partner-group { border-bottom: 1px solid var(--border); }
.partner-group:last-child { border-bottom: none; }
.partner-group-header {
  display: flex;
  align-items: center;
  gap: .5rem;
  padding: .55rem .75rem;
  cursor: pointer;
  font-size: .82rem;
  font-weight: 600;
  transition: background .1s;
  user-select: none;
}
.partner-group-header:hover { background: var(--surface-2); }
.pgg-arrow { font-size: .65rem; color: var(--text-2); transition: transform .2s; }
.pgg-label { flex: 1; }
.pgg-count {
  font-size: .75rem;
  font-weight: 400;
  color: var(--text-2);
}
.partner-group-body {
  display: none;
  max-height: 0;
  overflow: hidden;
  transition: max-height .25s ease;
}
.partner-group-body.open {
  display: block;
  max-height: 600px;
}
.partner-option {
  display: flex;
  align-items: center;
  gap: .5rem;
  padding: .35rem .75rem .35rem 1.75rem;
  cursor: pointer;
  font-size: .8rem;
  transition: background .1s;
  user-select: none;
}
.partner-option:hover { background: var(--surface-2); }
.partner-option .po-name { flex: 1; }
.partner-option .po-handle { font-size: .72rem; color: var(--text-2); }
.partner-option::before {
  content: '○';
  font-size: .75rem;
  color: var(--text-2);
  width: 1rem;
}
.partner-option.selected::before {
  content: '✓';
  color: var(--accent);
  font-weight: 700;
}
.filter-info {
  font-size: .78rem;
  color: var(--text-2);
  margin-bottom: 1rem;
  min-height: 1.2em;
}

.empty-state {
  text-align: center;
  padding: 3rem;
  color: var(--text-2);
  font-size: .9rem;
}

.timeline {
  position: relative;
  margin: 0 0 2rem;
}
.timeline::before {
  content: '';
  position: absolute;
  left: 50%;
  top: 0;
  bottom: 0;
  width: 2px;
  background: var(--border);
  transform: translateX(-50%);
}
.tl-item {
  display: flex;
  position: relative;
  margin: 0 0 1.5rem;
}
.tl-item .tl-dot {
  position: absolute;
  left: 50%;
  top: 20px;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: var(--accent);
  border: 3px solid var(--surface);
  transform: translateX(-50%);
  z-index: 1;
}
.tl-item.stream .tl-dot { background: var(--accent-3); }
.tl-item.collab .tl-dot { background: var(--accent-2); }
.tl-item .tl-card {
  width: calc(50% - 24px);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  transition: box-shadow .2s;
}
.tl-item .tl-card:hover { box-shadow: var(--shadow-lg); }
.tl-item.stream { justify-content: flex-start; }
.tl-item.collab { justify-content: flex-end; }
.tl-item .tl-card a,
.tl-item a.tl-card,
.tl-item .tl-card .tl-card-inner {
  display: flex;
  gap: .75rem;
  text-decoration: none;
  color: var(--text);
  padding: .75rem;
}
.tl-item .tl-thumb {
  width: 80px;
  height: 45px;
  border-radius: 6px;
  object-fit: cover;
  flex-shrink: 0;
  background: var(--surface-2);
}
.tl-item .tl-body { flex: 1; min-width: 0; }
.tl-item .tl-body .tl-title {
  font-size: .85rem;
  font-weight: 500;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  line-height: 1.3;
}
.tl-item .tl-body .tl-meta {
  font-size: .75rem;
  color: var(--text-2);
  margin-top: .25rem;
}
.tl-item .tl-body .tl-meta .tl-badge {
  display: inline-block;
  font-size: .65rem;
  padding: .1rem .45rem;
  border-radius: 999px;
  font-weight: 500;
  margin-right: .35rem;
}
.tl-badge-stream { background: rgba(6,182,212,.12); color: #06b6d4; }
.tl-badge-collab { background: rgba(236,72,153,.12); color: #ec4899; }
.tl-item.collab .tl-card { border-color: rgba(236,72,153,.2); }
.tl-item.stream .tl-card { border-color: rgba(6,182,212,.2); }
.tl-partners {
  font-size: .75rem;
  color: var(--text-2);
  margin-top: .25rem;
}
.tl-partners .partner {
  display: inline-block;
  background: var(--surface-2);
  padding: .1rem .45rem;
  border-radius: 999px;
  margin: .15rem .2rem .15rem 0;
  font-size: .7rem;
}
.tl-arrow {
  font-size: .7rem;
  color: var(--text-2);
  margin-left: .35rem;
  display: inline-block;
  transition: transform .2s;
}
.tl-card.collab-group { cursor: pointer; }
.tl-card.collab-group .tl-arrow.open { transform: rotate(90deg); }
.tl-subs {
  max-height: 0;
  overflow: hidden;
  transition: max-height .25s ease;
  border-top: 1px solid var(--border);
}
.tl-subs.open {
  max-height: 1000px;
  padding: .5rem 0;
}
.tl-sub {
  display: flex;
  align-items: center;
  gap: .5rem;
  padding: .3rem .75rem .3rem 0;
  font-size: .8rem;
  color: var(--text);
  text-decoration: none;
}
.tl-sub:hover { background: var(--surface-2); }
.tl-sub .sub-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--accent-2);
  flex-shrink: 0;
  margin-left: .75rem;
}
.tl-sub-title { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.tl-sub-meta { font-size: .7rem; color: var(--text-2); white-space: nowrap; }
.tl-sub .sub-label {
  color: var(--text-2);
  font-size: .7rem;
}
.sub-avatar {
  width: 20px;
  height: 20px;
  border-radius: 50%;
  object-fit: cover;
  flex-shrink: 0;
  margin-left: .75rem;
}

/* ── Paired entry (self + collab side by side) ── */
.tl-item.pair {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin: 0 0 1.5rem;
  position: relative;
}
.tl-item.pair .tl-dot {
  position: absolute;
  left: 50%;
  top: 20px;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: var(--accent-3);
  border: 3px solid var(--surface);
  transform: translateX(-50%);
  z-index: 1;
}
.tl-pair-stream,
.tl-pair-collab {
  width: calc(50% - 24px);
}
.tl-pair-stream .tl-card {
  width: 100%;
  border-color: rgba(6,182,212,.2);
}
.tl-pair-collab .tl-card {
  width: 100%;
  border-color: rgba(236,72,153,.2);
}

@media (max-width: 640px) {
  main { padding: 0 1rem; }
  .stat-row { grid-template-columns: 1fr; }
  .profile { flex-direction: column; text-align: center; }
  .timeline::before { left: 16px; }
  .tl-item .tl-dot { left: 16px; }
  .tl-item.stream,
  .tl-item.collab { justify-content: flex-end; }
  .tl-item .tl-card { width: calc(100% - 40px); }
  .tl-item.pair { flex-direction: column; gap: 1rem; }
  .tl-item.pair .tl-dot { left: 50%; }
  .tl-pair-stream,
  .tl-pair-collab { width: 100%; }
}
.tl-empty {
  text-align: center;
  padding: 3rem;
  color: var(--text-2);
  font-size: .9rem;
}
.tl-section-title {
  font-size: 1rem;
  font-weight: 600;
  margin-bottom: 1rem;
  display: flex;
  align-items: center;
  gap: .5rem;
}
.tl-section-title .tl-count {
  font-size: .75rem;
  font-weight: 400;
  color: var(--text-2);
}
.tl-month-divider {
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 1.5rem 0 .75rem;
  position: relative;
  z-index: 1;
}
.tl-month-divider::before {
  content: '';
  position: absolute;
  left: 0;
  right: 0;
  top: 50%;
  height: 1px;
  background: var(--border);
}
.tl-month-label {
  position: relative;
  padding: 0 .75rem;
  font-size: .78rem;
  color: var(--text-2);
  font-weight: 500;
  background: var(--bg);
}
</style>
</head>

<script>
let selectedPartners = [];

const saved = localStorage.getItem('hcat-theme');
if (saved === 'dark') document.body.classList.add('dark');
function toggleTheme() {
  document.body.classList.toggle('dark');
  localStorage.setItem('hcat-theme', document.body.classList.contains('dark') ? 'dark' : 'light');
}

function filterTimeline() {
  const kw = document.getElementById('keywordFilter').value.toLowerCase();
  const dateFrom = document.getElementById('dateFrom').value;
  const dateTo = document.getElementById('dateTo').value;

  let visible = 0, total = 0;
  document.querySelectorAll('.tl-item').forEach(el => {
    total++;
    const title = (el.querySelector('.tl-title')?.textContent || '').toLowerCase();
    const p = el.dataset.partners || '';
    const d = el.dataset.date || '';

    const matchKw = !kw || title.includes(kw);
    const matchDate = (!dateFrom || d >= dateFrom.replace(/-/g, '')) && (!dateTo || d <= dateTo.replace(/-/g, ''));
    const matchPartner = selectedPartners.length === 0 || selectedPartners.some(s => p.includes(s));

    const show = matchKw && matchDate && matchPartner;
    el.style.display = show ? '' : 'none';
    if (show) visible++;
  });

  const info = document.getElementById('filterInfo');
  if (visible < total) {
    info.textContent = 'Showing ' + visible + ' of ' + total + ' entries';
  } else {
    info.textContent = '';
  }
}

function togglePartnerDropdown() {
  document.getElementById('partnerDropdown').classList.toggle('open');
}

function toggleGroup(header) {
  const body = header.nextElementSibling;
  const arrow = header.querySelector('.pgg-arrow');
  const isOpen = body.classList.toggle('open');
  arrow.textContent = isOpen ? '▼' : '▶';
}

function togglePartnerOption(el) {
  const handle = el.dataset.handle;
  const idx = selectedPartners.indexOf(handle);
  if (idx >= 0) {
    selectedPartners.splice(idx, 1);
    el.classList.remove('selected');
  } else {
    selectedPartners.push(handle);
    el.classList.add('selected');
  }
  updateSelectedDisplay();
  filterTimeline();
}

function updateSelectedDisplay() {
  const container = document.getElementById('selectedTags');
  const placeholder = document.getElementById('selectedPlaceholder');
  container.innerHTML = '';
  if (selectedPartners.length === 0) {
    placeholder.style.display = '';
    return;
  }
  placeholder.style.display = 'none';
  selectedPartners.forEach(h => {
    const tag = document.createElement('span');
    tag.className = 'selected-tag';
    tag.innerHTML = '@' + h + ' <span class="selected-tag-remove" data-handle="' + h + '">&times;</span>';
    container.appendChild(tag);
  });
  container.querySelectorAll('.selected-tag-remove').forEach(btn => {
    btn.onclick = function(e) {
      e.stopPropagation();
      removePartner(this.dataset.handle);
    };
  });
}

function removePartner(handle) {
  const idx = selectedPartners.indexOf(handle);
  if (idx >= 0) {
    selectedPartners.splice(idx, 1);
    document.querySelectorAll('.partner-option.selected[data-handle="' + handle + '"]').forEach(el => el.classList.remove('selected'));
    updateSelectedDisplay();
    filterTimeline();
  }
}

function selectPartnerOnly(handle) {
  selectedPartners = [handle];
  document.querySelectorAll('.partner-option').forEach(el => {
    el.classList.toggle('selected', el.dataset.handle === handle);
  });
  updateSelectedDisplay();
  filterTimeline();
}

function toggleCollabGroup(el) {
  var arrow = el.querySelector('.tl-arrow');
  var subs = el.querySelector('.tl-subs');
  if (subs) {
    subs.classList.toggle('open');
    if (arrow) arrow.classList.toggle('open');
  }
}

function resetFilters() {
  document.getElementById('keywordFilter').value = '';
  document.getElementById('dateFrom').value = '';
  document.getElementById('dateTo').value = '';
  selectedPartners = [];
  document.querySelectorAll('.partner-option.selected').forEach(el => el.classList.remove('selected'));
  updateSelectedDisplay();
  filterTimeline();
}

document.addEventListener('click', function(e) {
  const widget = document.getElementById('partnerSelect');
  if (widget && !widget.contains(e.target)) {
    const dd = document.getElementById('partnerDropdown');
    if (dd) dd.classList.remove('open');
    document.querySelectorAll('.partner-group-body.open').forEach(el => el.classList.remove('open'));
    document.querySelectorAll('.pgg-arrow').forEach(el => el.textContent = '▶');
  }
});
</script>
</body>
</html>
