<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stats — HCAT</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f8f9fc; --surface: #fff; --surface-2: #f0f2f6;
  --text: #1a1d23; --text-2: #6b7280; --border: #e5e7eb;
  --accent: #8b5cf6; --accent-2: #ec4899;
  --gradient: linear-gradient(135deg, var(--accent), var(--accent-2));
  --radius: 12px; --radius-sm: 8px;
}
.dark {
  --bg: #0f1117; --surface: #1a1d26; --surface-2: #252833;
  --text: #e8eaed; --text-2: #9ca3af; --border: #2d3140;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  background: var(--bg); color: var(--text); line-height: 1.6;
  transition: background .3s, color .3s;
}
header {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 1rem 2rem; position: sticky; top: 0; z-index: 100;
  backdrop-filter: blur(12px);
}
.dark header { background: rgba(15,17,23,.85); }
header .inner {
  max-width: 1200px; margin: 0 auto;
  display: flex; align-items: center; justify-content: space-between;
}
header h1 { font-size: 1.15rem; font-weight: 600; }
header h1 a { text-decoration: none; color: var(--text); }
header h1 span { background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
header nav a {
  text-decoration: none; color: var(--text-2); font-size: .875rem;
  padding: .4rem .8rem; border-radius: var(--radius-sm); transition: all .2s;
}
header nav a:hover { color: var(--text); background: var(--surface-2); }
main { max-width: 800px; margin: 2rem auto; padding: 0 2rem; }
h2 { font-size: 1.5rem; font-weight: 700; margin-bottom: 1.5rem; }
.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 1.5rem;
  margin-bottom: 1rem;
}
table { width: 100%; border-collapse: collapse; }
th { text-align: left; padding: .75rem; font-size: .75rem; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; color: var(--text-2); border-bottom: 2px solid var(--border); }
td { padding: .75rem; border-bottom: 1px solid var(--border); font-size: .875rem; }
tfoot td { border-top: 2px solid var(--border); font-weight: 600; border-bottom: none; }
.num { font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<header>
<div class="inner">
<h1><a href="index.html"><span>HCAT</span> · Stats</a></h1>
<nav><a href="index.html">Members</a><a href="unknowns.html">Unknowns</a></nav>
</div>
</header>
<main>
<h2>Statistics</h2>
<div class="card">
<table>
<thead><tr><th>Branch</th><th>Members</th><th>Appearances</th></tr></thead>
<tbody>

<tr><td>JP</td><td class="num">36</td><td class="num">368</td></tr>

<tr><td>EN</td><td class="num">20</td><td class="num">17511</td></tr>

<tr><td>ID</td><td class="num">9</td><td class="num">0</td></tr>

<tr><td>DEV_IS</td><td class="num">10</td><td class="num">0</td></tr>

<tr><td>holoAN</td><td class="num">4</td><td class="num">0</td></tr>

<tr><td>Official</td><td class="num">5</td><td class="num">23</td></tr>

</tbody>
<tfoot>
<tr><td><strong>Total</strong></td><td class="num"><strong>84</strong></td><td class="num"><strong>17902</strong></td></tr>
</tfoot>
</table>
</div>
</main>
</body>
</html>
