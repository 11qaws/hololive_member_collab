<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Search — HCAT</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
<link rel="stylesheet" href="static/style.css">

<style>
main { max-width: 800px; }
h2 { font-size: 1.5rem; font-weight: 700; margin-bottom: .5rem; }
p { color: var(--text-2); margin-bottom: 1rem; font-size: .9rem; }
#search-input {
  width: 100%;
  padding: .6rem .8rem;
  font-size: 1rem;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--surface);
  color: var(--text-1);
  outline: none;
  box-sizing: border-box;
  margin-bottom: .5rem;
}
#search-input:focus { border-color: var(--accent); }
.search-hint { font-size: .8rem; color: var(--text-3); margin-bottom: 1rem; }
#results { list-style: none; padding: 0; margin: 0; }
.result-item {
  display: flex;
  gap: .75rem;
  padding: .6rem .8rem;
  border-bottom: 1px solid var(--border);
  align-items: flex-start;
  text-decoration: none;
  color: var(--text-1);
  transition: background .1s;
}
.result-item:hover { background: var(--hover); }
.result-icon {
  flex-shrink: 0;
  width: 28px; height: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: .75rem;
  font-weight: 700;
  margin-top: 2px;
}
.result-icon.stream { background: #1d4ed8; color: #fff; }
.result-icon.collab { background: #9333ea; color: #fff; }
.result-body { flex: 1; min-width: 0; }
.result-title {
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-bottom: .15rem;
}
.result-meta {
  font-size: .78rem;
  color: var(--text-2);
  display: flex;
  flex-wrap: wrap;
  gap: .5rem;
}
.result-meta .member-link {
  color: var(--accent);
  text-decoration: none;
}
.result-meta .member-link:hover { text-decoration: underline; }
.result-tag {
  font-size: .7rem;
  padding: .1rem .4rem;
  border-radius: 999px;
  background: var(--bg);
  display: inline-block;
}
.partner-list { color: var(--text-3); font-size: .75rem; }
#search-status {
  color: var(--text-2);
  text-align: center;
  padding: 2rem;
  font-size: .9rem;
}
#search-status.loading { color: var(--accent); }
</style>

</head>
<body>
<header>
<div class="inner">
<h1><a href="index.html"><span>HCAT</span></a></h1>
<nav>
<a href="index.html" class="">Members</a>
<a href="stats.html" class="">Stats</a>
<a href="unknowns.html" class="">Unknowns</a>
<a href="graph.html" class="">Graph</a>
<a href="search.html" class="active">Search</a>
<a href="compare.html" class="">Compare</a>
<a href="dashboard.html" class="">Dashboard</a>
<button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">🌙</button>
</nav>
</div>
</header>
<main>

<h2>Search Timeline</h2>
<p>Search across all members' timeline entries.</p>
<input type="text" id="search-input" placeholder="Search titles, members, partners…" autofocus>
<div class="search-hint"><span id="result-count">59835</span> entries indexed (12.6MB). Type to search.</div>
<ul id="results"></ul>
<div id="search-status">Loading index…</div>

</main>
<script src="static/theme.js"></script>

<script id="nicknames" type="application/json">{"tokinosora": "Sora", "robocosan": "Roboco", "akirose": "Akirose", "akaihaato": "Haato", "shirakamifubuki": "Fubuki", "natsuiromatsuri": "Matsuri", "nakiri_ayame": "Ayame", "yuzuki_choco": "Choco", "oozora_subaru": "Subaru", "azki": "AZKi", "ookamimio": "Mio", "sakuramiko": "Miko", "nekomataokayu": "Okayu", "inugamikorone": "Korone", "hoshimachisuisei": "Suisei", "usadapekora": "Pekora", "shiranuiflare": "Flare", "shiroganenoel": "Noel", "houshoumarine": "Marine", "tsunomakiwatame": "Watame", "tokoyamitowa": "Towa", "himemoriluna": "Luna", "yukihanalamy": "Lamy", "momosuzunene": "Nene", "shishirobotan": "Botan", "omarupolka": "Polka", "ladarknesss": "La+", "takanelui": "Lui", "hakuikoyori": "Koyori", "kazamairoha": "Iroha", "sakamatachloe": "Chloe", "ayunda_risu": "Risu", "moona_hoshinova": "Moona", "airaniiofifteen": "Iofi", "kureijiollie": "Ollie", "aniamelfissa": "Anya", "pavoliareine": "Reine", "vestia_zeta": "Zeta", "kaelakovalskia": "Kaela", "kobokanaeru": "Kobo", "moricalliope": "Calli", "takanashikiara": "Kiara", "ninomaeinanis": "Ina", "watsonamelia": "Amelia", "irys": "IRyS", "ourokronii": "Kronii", "hakosbaelz": "Baelz", "shiorinovella": "Shiori", "kosekibijou": "Bijou", "nerissaravencroft": "Nerissa", "fuwawa_abyssgard": "Fuwawa", "mococo_abyssgard": "Mococo", "holoen_erbloodflame": "ERB", "holoen_gigimurin": "Gigi", "holoen_ceciliaimmergreen": "Cecilia", "holoen_raorapanthera": "Raora", "otonosekanade": "Kanade", "ichijouririka": "Ririka", "juufuuteiraden": "Raden", "todorokihajime": "Hajime", "isakiriona": "Riona", "koganei_niko": "Niko", "mizumiya_su": "Su", "rindo_chihaya": "Chihaya", "kikirara_vivi": "Vivi", "izuki_michiru": "Michiru", "hanazono_sayaka": "Sayaka", "kazeshiro_yuki": "Yuki", "minatoaqua": "Aqua", "murasakishion": "Shion", "amanekanata": "Kanata", "kiryucoco": "Coco", "gawrgura": "Gura", "tsukumosana": "Sana", "ceresfauna": "Fauna", "nanashimumei": "Mumei", "hiodoshi_ao": "Ao", "harusaki_nodoka": "Nodoka", "friend_a": "(A-chan)", "hololive": "ホロライブ公式", "hololiveenglish": "English", "hololiveindonesia": "Indonesia", "hololivedev_is": "ReGLOSS", "dev_is_flowglow": "GLOW"}</script>
<script>
(function() {
  var index = null;
  var loading = false;
  var nicknames = {};
  try { nicknames = JSON.parse(document.getElementById('nicknames').textContent); } catch(e) {}

  var input = document.getElementById('search-input');
  var list = document.getElementById('results');
  var status = document.getElementById('search-status');
  var countSpan = document.getElementById('result-count');

  function getNickname(h) { return nicknames[h] || h; }

  function loadIndex() {
    if (index || loading) return;
    loading = true;
    status.textContent = 'Loading search index (12.6MB)…';
    status.classList.add('loading');
    fetch('data/search_index.json')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        index = data;
        status.style.display = 'none';
        countSpan.textContent = index.length;
        if (input.value.trim()) render(input.value.trim());
      })
      .catch(function(err) {
        status.textContent = 'Failed to load search index: ' + err.message;
        status.classList.remove('loading');
      });
  }

  function escapeHtml(s) {
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function highlight(text, query) {
    if (!query) return escapeHtml(text);
    var re = new RegExp('(' + query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
    return escapeHtml(text).replace(re, '<mark style="background:rgba(59,130,246,.3);color:inherit;padding:0 .1em">$1</mark>');
  }

  function render(query) {
    if (!query || query.length < 1) {
      list.innerHTML = '';
      return;
    }
    var q = query.toLowerCase();
    var results = [];
    for (var i = 0; i < index.length; i++) {
      var e = index[i];
      if (e.t.toLowerCase().indexOf(q) !== -1 ||
          e.h.toLowerCase().indexOf(q) !== -1 ||
          (e.p && e.p.toLowerCase().indexOf(q) !== -1) ||
          (e.n && e.n.toLowerCase().indexOf(q) !== -1)) {
        results.push(e);
        if (results.length >= 200) break;
      }
    }

    if (results.length === 0) {
      list.innerHTML = '<li style="color:var(--text-2);text-align:center;padding:2rem;font-size:.9rem">No results found</li>';
      return;
    }

    list.innerHTML = results.map(function(e) {
      var type = e.ty === 'stream' ? 'stream' : 'collab';
      var iconText = type === 'stream' ? 'S' : 'C';
      var partners = (e.p || '').split(', ').filter(Boolean).map(function(h) { return getNickname(h.trim()); });
      var partnerStr = partners.length > 0 ? 'with ' + partners.join(', ') : '';
      return '<a href="' + (type === 'stream' ? 'https://youtube.com/watch?v=' + e.v : 'members/' + e.h + '.html') + '" class="result-item" target="_blank" rel="noopener">' +
        '<div class="result-icon ' + type + '">' + iconText + '</div>' +
        '<div class="result-body">' +
          '<div class="result-title">' + highlight(e.t, query) + '</div>' +
          '<div class="result-meta">' +
            '<span>' + (e.d ? e.d.slice(0, 10) : '') + '</span>' +
            '<span class="member-link">' + highlight(getNickname(e.h), query) + '</span>' +
            (partnerStr ? '<span class="partner-list">' + highlight(partnerStr, query) + '</span>' : '') +
          '</div>' +
        '</div>' +
      '</a>';
    }).join('');
  }

  var debounceTimer;
  input.addEventListener('input', function() {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(function() { render(input.value.trim()); }, 150);
  });
})();
</script>

</body>
</html>
