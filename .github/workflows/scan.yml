name: Scan
on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install httpx jinja2
      - name: Setup API key
        run: echo '{"holodex_api_key":"${{ secrets.HOLODEX_API_KEY }}"}' > data/config.json
      - name: Scan all members (one per minute)
        run: python scripts/gha_scan_all.py
      - name: Refresh timelines
        run: python cli.py timeline --all --full
      - name: Build site
        run: python cli.py build-site
      - name: Commit & push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: 자동 스캔 $(date +'%Y-%m-%d')"
          commit_user_name: "HCAT Bot"
          commit_user_email: "actions@github.com"
